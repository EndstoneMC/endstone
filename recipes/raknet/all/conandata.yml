patches:
  "4.081":
    - patch_file: "patches/4.081-fix-gettimeofday-include.patch"
      patch_description: "Fix malformed `#include < time.h >` (spaces inside angle brackets) that modern preprocessors reject."
      patch_type: "portability"
    - patch_file: "patches/4.081-linux-portability.patch"
      patch_description: "Add <netdb.h> and LinuxStrings.h to the POSIX socket include block (getaddrinfo, hostent, _stricmp shim)."
      patch_type: "portability"
    - patch_file: "patches/4.081-enable-ipv6.patch"
      patch_description: "Enable RAKNET_SUPPORT_IPV6"
      patch_type: "conan"
    - patch_file: "patches/4.081-disable-plugins.patch"
      patch_description: "Disable all optional RakNet plugins"
      patch_type: "conan"
  "4.081-mojang":
    - patch_file: "patches/4.081-fix-gettimeofday-include.patch"
      patch_description: "Fix malformed `#include < time.h >` (spaces inside angle brackets) that modern preprocessors reject."
      patch_type: "portability"
    - patch_file: "patches/4.081-linux-portability.patch"
      patch_description: "Add <netdb.h> and LinuxStrings.h to the POSIX socket include block (getaddrinfo, hostent, _stricmp shim)."
      patch_type: "portability"
    - patch_file: "patches/4.081-enable-ipv6.patch"
      patch_description: "Enable RAKNET_SUPPORT_IPV6"
      patch_type: "conan"
    - patch_file: "patches/4.081-disable-plugins.patch"
      patch_description: "Disable all optional RakNet plugins"
      patch_type: "conan"
    # Mojang-specific divergence (ABI + wire protocol) goes below, e.g.:
    # - patch_file: "patches/4.081-mojang-<topic>.patch"
    #   patch_description: "..."
    #   patch_type: "conan"
