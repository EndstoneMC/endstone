name: endstone

services:
  endstone:
    build:
      context: .
    image: endstone/endstone:latest
    container_name: endstone
    restart: unless-stopped

    # keep STDIN open + a TTY so the server console works under `docker attach`
    stdin_open: true
    tty: true

    # Give the Bedrock server time to save the world before it is killed.
    stop_grace_period: 15s

    ports:
      - "19132:19132/udp"  # IPv4 game port
      - "19133:19133/udp"  # IPv6 game port

    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}

    volumes:
      # Persist the world, plugins and configuration on the host.
      - ./data:/data
