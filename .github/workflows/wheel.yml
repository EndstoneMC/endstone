name: Wheel

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - stable
      - v*
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: wheel-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build_wheels:
    name: Build Wheel (${{ matrix.python-tag }}-${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-2022 ]
        python-tag: [ "cp310", "cp311", "cp312", "cp313", "cp314" ]
        include:
          - os: ubuntu-latest
            platform: manylinux_x86_64
          - os: windows-2022
            platform: win_amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Restore Conan cache
        uses: ./.github/actions/conan-cache/restore

      - name: Set up Conan
        uses: ./.github/actions/setup-conan
        with:
          build-type: Release
          install-dependencies: 'false'

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86_64

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          CIBW_BUILD: ${{ matrix.python-tag }}-${{ matrix.platform }}
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_PASS_LINUX: "SENTRY_AUTH_TOKEN"
          # cibuildwheel copies the project into the Linux container
          # rather than bind-mounting it, so conan writes to
          # /project/.conan2 (per .conanrc) are isolated from the host
          # and lost on container cleanup. Bind-mount the workspace's
          # .conan2 over the container's /project/.conan2 so packages
          # persist to the host for actions/cache to save.
          CIBW_CONTAINER_ENGINE: "docker; create_args: --volume ${{ github.workspace }}/.conan2:/project/.conan2"

      - name: Reclaim ownership of project-local Conan home (Linux)
        if: always() && runner.os == 'Linux'
        # The volume-mounted .conan2 is written by root inside the
        # container; hand it back to the runner user so actions/cache
        # can save it.
        run: sudo chown -R "$(id -u):$(id -g)" .conan2

      - name: Save Conan cache
        # wheel.yml owns the cache: its Linux build runs inside the
        # manylinux_2_31 container (glibc 2.31), producing binaries
        # that link cleanly both there and on newer hosts. ci.yml's
        # host binaries (glibc 2.35) would be forward-incompatible
        # with the container, so ci.yml is restore-only.
        # Save once per (os, build-type) - cp313 is the canonical wheel.
        if: matrix.python-tag == 'cp313' && github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/conan-cache/save

      - uses: actions/upload-artifact@v7
        with:
          name: endstone-wheels-${{ matrix.python-tag }}-${{ matrix.platform }}
          path: ./wheelhouse/*.whl

  portable:
    name: Portable (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [ build_wheels ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win_amd64
            os: windows
            arch: x64
            script: .github/portable/start.cmd
          - platform: manylinux_x86_64
            os: linux
            arch: x64
            script: .github/portable/start.sh

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/portable
            CHANGELOG.md
            LICENSE

      - name: Download Wheel Artifact
        uses: actions/download-artifact@v7
        with:
          name: endstone-wheels-cp313-${{ matrix.platform }}
          path: wheelhouse

      - name: Stage bundle
        run: |
          wheel=$(ls wheelhouse/endstone-*.whl | head -n1)
          version=$(basename "$wheel" | cut -d'-' -f2)
          bundle="endstone-${version}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "dist/$bundle"
          cp "${{ matrix.script }}" "dist/$bundle/"
          cp CHANGELOG.md LICENSE "dist/$bundle/"
          cp "$wheel" "dist/$bundle/"
          chmod +x "dist/$bundle/$(basename "${{ matrix.script }}")"
          echo "BUNDLE_NAME=$bundle" >> "$GITHUB_ENV"

      - name: Create archive
        run: |
          cd dist
          zip -r "../${BUNDLE_NAME}.zip" "$BUNDLE_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: endstone-${{ matrix.os }}-${{ matrix.arch }}-portable
          path: ${{ env.BUNDLE_NAME }}.zip

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [ build_wheels, portable ]
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: endstone-wheels-*
          path: dist/wheels
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/wheels

      - name: Download portable artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: endstone-*-portable
          path: dist/portable
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/portable/*
