name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'EndstoneMC/endstone'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: $GITHUB_REF_NAME (expected vX.Y.Z)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Extract release notes from CHANGELOG.md
        run: |
          BODY=$(sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[/d; p}" CHANGELOG.md)
          BODY=$(echo "$BODY" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "$BODY" ]; then
            echo "::error::No [$VERSION] section found in CHANGELOG.md. Stamp the changelog before tagging."
            exit 1
          fi
          echo "$BODY" > /tmp/release_body.md
          echo "Extracted release notes:"
          echo "$BODY"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...v%s\n' \
              "${{ github.repository }}" "$PREV_TAG" "$VERSION" >> /tmp/release_body.md
          fi
          # Idempotent: wheel.yml's softprops/action-gh-release@v3 may have
          # already auto-created the release while uploading the portable archives.
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release edit "v$VERSION" \
              --title "v$VERSION" \
              --notes-file /tmp/release_body.md
          else
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --notes-file /tmp/release_body.md
          fi
