name: CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths: &code-paths
      - 'src/**'
      - 'include/**'
      - 'endstone/**'
      - 'tests/**'
      - 'recipes/**'
      - 'scripts/**'
      - 'CMakeLists.txt'
      - 'conanfile.py'
      - 'pyproject.toml'
      - 'codecov.yml'
      - '.conan2/**'
      - '.conanrc'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'
  push:
    branches:
      - main
      - develop
      - v*
    paths: *code-paths

permissions: read-all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, windows-2022 ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Clang (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-clang

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86_64

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Restore Conan cache
        uses: ./.github/actions/conan-cache/restore

      - name: Set up Conan
        uses: ./.github/actions/setup-conan

      - name: Build with CMake
        run: |
          cmake --preset conan-relwithdebinfo
          cmake --build --preset conan-relwithdebinfo

      - name: Run Tests
        run: ctest --preset conan-relwithdebinfo

  coverage:
    name: Coverage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Clang (Linux)
        uses: ./.github/actions/setup-clang

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Restore Conan cache
        uses: ./.github/actions/conan-cache/restore

      - name: Set up Conan
        uses: ./.github/actions/setup-conan
        with:
          install-dependencies: 'false'

      - name: Install dependencies (Endstone=Debug, deps=Release)
        run: conan install . --build=missing -s "&:build_type=Debug"

      - name: Build with CMake
        run: |
          cmake --preset conan-debug -DCODE_COVERAGE=ON
          cmake --build --preset conan-debug

      - name: Run Tests
        run: ctest --preset conan-debug

      - name: Generate Coverage Report
        run: |
          pip install gcovr
          gcovr -r . --filter src/endstone_core/ --gcov-executable "llvm-cov gcov" --xml coverage.xml build/Debug

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
