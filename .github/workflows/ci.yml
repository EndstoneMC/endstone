name: CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
      - develop
      - v*

permissions: read-all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, windows-2022 ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Clang (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-clang

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86_64

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Restore Conan cache
        uses: ./.github/actions/conan-cache/restore

      - name: Set up Conan
        uses: ./.github/actions/setup-conan

      - name: Build with CMake
        run: |
          cd build/Release
          cmake ../.. -G Ninja -DCMAKE_TOOLCHAIN_FILE="generators/conan_toolchain.cmake" -DCMAKE_BUILD_TYPE=Release
          cmake --build .

      - name: Run Tests
        run: ctest --test-dir build/Release

  coverage:
    name: Coverage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Clang (Linux)
        uses: ./.github/actions/setup-clang

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Restore Conan cache
        uses: ./.github/actions/conan-cache/restore

      - name: Set up Conan
        uses: ./.github/actions/setup-conan
        with:
          install-dependencies: 'false'

      - name: Install dependencies (Endstone=Debug, deps=Release)
        # The `&:` prefix scopes the override to the consumer only, so dep
        # binaries are pulled from the same Release cache the build job uses.
        # Endstone's build_type is Debug, putting the toolchain and CMakeDeps
        # configs under build/Debug/generators/ and matching the
        # CMAKE_BUILD_TYPE=Debug we use at cmake configure time.
        run: conan install . --build=missing -s "&:build_type=Debug"

      - name: Build with CMake
        run: |
          cd build/Debug
          cmake ../.. -G Ninja -DCMAKE_TOOLCHAIN_FILE="generators/conan_toolchain.cmake" -DCMAKE_BUILD_TYPE=Debug -DCODE_COVERAGE=ON
          cmake --build .

      - name: Run Tests
        run: ctest --test-dir build/Debug

      - name: Generate Coverage Report
        run: |
          pip install gcovr
          gcovr -r . --filter src/endstone_core/ --gcov-executable "llvm-cov gcov" --xml coverage.xml build/Debug

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
