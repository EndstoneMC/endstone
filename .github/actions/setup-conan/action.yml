name: 'Set up Conan'
description: 'Install Conan and optionally run `conan install` for the given build type.'

inputs:
  build-type:
    description: 'CMake build type (Release, Debug, RelWithDebInfo)'
    required: false
    default: 'Release'
  profile:
    description: 'Conan profile name. Empty auto-picks from runner.os.'
    required: false
    default: ''
  python-version:
    description: 'Python version to set up'
    required: false
    default: '3.12'
  install-dependencies:
    description: 'Run conan install after setup (set false for cibuildwheel workflows)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Install Conan
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install conan

    - name: Install dependencies with Conan
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: |
        profile="${{ inputs.profile }}"
        if [ -z "$profile" ]; then
          case "$RUNNER_OS" in
            Linux)   profile=linux ;;
            Windows) profile=windows ;;
            *) echo "::error::No tracked profile for RUNNER_OS=$RUNNER_OS" && exit 1 ;;
          esac
        fi
        conan install . -pr:a "$profile" --build=missing -s build_type=${{ inputs.build-type }}
