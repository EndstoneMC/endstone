name: 'Save Conan cache'
description: 'Save .conan2/p to the Actions cache for the given build type.'

inputs:
  build-type:
    description: 'CMake build type that the cached binaries were built for.'
    required: false
    default: 'Release'

runs:
  using: 'composite'
  steps:
    - uses: actions/cache/save@v5
      with:
        path: .conan2/p
        key: ${{ runner.os }}-conan-${{ inputs.build-type }}-${{ hashFiles('conanfile.py', '.conan2/profiles/*') }}
